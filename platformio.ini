[common_base]
framework = arduino
board_build.filesystem = littlefs
monitor_speed = 115200
extra_scripts =
    pre:scripts/load_env.py
    pre:scripts/version.py
build_src_filter = +<*> -<bridge/>
build_flags =
    -DCORE_DEBUG_LEVEL=3
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    links2004/WebSockets @ ^2.4.1
    bertmelis/espMqttClient @ ^1.7.0
    sparkfun/SparkFun BME280
    adafruit/Adafruit SHT31 Library @ ^2.2.2
    paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^3.11.0
    adafruit/Adafruit NeoPixel
    sensirion/Sensirion I2C SCD4x
    sensirion/Sensirion I2C SGP41
    sensirion/Sensirion Gas Index Algorithm
    adafruit/Adafruit SHT4x Library
    adafruit/Adafruit BMP280 Library
    https://github.com/sparkfun/SparkFun_BMP581_Arduino_Library.git
    https://github.com/sparkfun/SparkFun_HTU21D_Breakout_Arduino_Library.git

[env:esp8266]
extends = common_base
platform = espressif8266
board = d1_mini
upload_speed = 921600
build_flags =
    ${common_base.build_flags}
    -DBOARD_ESP8266
    '-DOTA_VERSION_URL="https://ota.tartak.by/files/OTA/SensorNode/dev/version-esp8266.json"'
    -DEMC_MIN_FREE_MEMORY=8192

[env:esp8266-release]
extends = common_base
platform = espressif8266
board = d1_mini
upload_speed = 921600
build_flags =
    ${common_base.build_flags}
    -DBOARD_ESP8266
    '-DOTA_VERSION_URL="https://ota.tartak.by/files/OTA/SensorNode/release/version-esp8266.json"'
    -DEMC_MIN_FREE_MEMORY=8192

[env:esp32c3]
extends = common_base
platform = espressif32
board = esp32-c3-devkitm-1
board_build.partitions = partitions_esp32.csv
upload_speed = 921600
; Flash a blank otadata alongside the firmware so the bootloader always
; resets to ota_0 after a serial upload (prevents booting the old OTA slot).
board_upload.flash_extra_images =
    0xe000 factory/blank_otadata.bin
build_flags =
    ${common_base.build_flags}
    -DBOARD_ESP32C3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    '-DOTA_VERSION_URL="https://ota.tartak.by/files/OTA/SensorNode/dev/version-esp32c3.json"'

[env:esp32c3-release]
extends = common_base
platform = espressif32
board = esp32-c3-devkitm-1
board_build.partitions = partitions_esp32.csv
upload_speed = 921600
board_upload.flash_extra_images =
    0xe000 factory/blank_otadata.bin
build_flags =
    ${common_base.build_flags}
    -DBOARD_ESP32C3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    '-DOTA_VERSION_URL="https://ota.tartak.by/files/OTA/SensorNode/release/version-esp32c3.json"'
