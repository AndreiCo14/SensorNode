[common_base]
framework = arduino
board_build.filesystem = littlefs
monitor_speed = 115200
extra_scripts =
    pre:scripts/load_env.py
    pre:scripts/version.py
build_flags =
    -DCORE_DEBUG_LEVEL=3
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    links2004/WebSockets @ ^2.4.1
    bertmelis/espMqttClient @ ^1.7.0
    sparkfun/SparkFun BME280
    adafruit/Adafruit SHT31 Library @ ^2.2.2
    paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^3.11.0
    adafruit/Adafruit NeoPixel

[env:esp8266]
extends = common_base
platform = espressif8266
board = d1_mini
upload_speed = 921600
build_flags =
    ${common_base.build_flags}
    -DBOARD_ESP8266
    '-DOTA_VERSION_URL="https://ota.tartak.by/files/OTA/SensorNode/dev/version-esp8266.json"'
    -DEMC_MIN_FREE_MEMORY=8192

[env:esp32c3]
extends = common_base
platform = espressif32
board = esp32-c3-devkitm-1
board_build.partitions = partitions_esp32.csv
upload_speed = 921600
build_flags =
    ${common_base.build_flags}
    -DBOARD_ESP32C3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    '-DOTA_VERSION_URL="https://ota.tartak.by/files/OTA/SensorNode/dev/version-esp32c3.json"'
